<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IVR Call Assistant</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #111111;
      --border-color: #cccccc;
      --input-bg: #f9f9f9;
      --button-bg: #E50914;
      --button-text: #ffffff;
      --button-secondary-bg: #eeeeee;
      --button-secondary-text: #333333;
      --log-bg: #f5f5f5;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --text-color: #eeeeee;
      --border-color: #444444;
      --input-bg: #2a2a2a;
      --button-bg: #E50914;
      --button-text: #ffffff;
      --button-secondary-bg: #333333;
      --button-secondary-text: #eeeeee;
      --log-bg: #222222;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      transition: background-color 0.2s, color 0.2s;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 2em;
    }

    p.subtitle {
      margin: 0;
      color: #777;
    }

    [data-theme="dark"] p.subtitle {
      color: #aaa;
    }

    .header-info {
      text-align: right;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.9em;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      font-size: 0.9em;
      padding: 4px 8px;
      border: 1px solid var(--border-color);
      background: var(--input-bg);
      border-radius: 4px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #888;
    }

    .dot.live {
      background-color: #28a745;
    }

    .main-content {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    @media (max-width: 850px) {
      .main-content {
        flex-direction: column;
      }
    }

    section.left-panel,
    section.right-panel {
      flex: 1;
      width: 100%;
    }

    h2 {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 5px;
      margin-top: 0;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 0.95em;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 4px;
      font-size: 1em;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--button-bg);
    }

    textarea {
      height: 100px;
      resize: vertical;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      flex: 1;
    }

    button#startBtn {
      background-color: var(--button-bg);
      color: var(--button-text);
    }

    button#stopBtn {
      background-color: var(--button-secondary-bg);
      color: var(--button-secondary-text);
      border: 1px solid var(--border-color);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .warning {
      margin-top: 15px;
      font-size: 0.85em;
      color: #856404;
      background-color: #fff3cd;
      padding: 10px;
      border: 1px solid #ffeeba;
      border-radius: 4px;
    }

    [data-theme="dark"] .warning {
      color: #ffda6a;
      background-color: #4d4013;
      border-color: #665511;
    }

    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .metric-item {
      flex: 1;
      min-width: 120px;
    }

    .metric-label {
      font-size: 0.85em;
      text-transform: uppercase;
      color: #666;
      font-weight: bold;
      margin-bottom: 5px;
    }

    [data-theme="dark"] .metric-label {
      color: #aaa;
    }

    .metric-value {
      font-size: 1.5em;
      font-weight: bold;
    }

    .metric-note {
      font-size: 0.8em;
      color: #888;
    }

    .logs-container {
      background-color: var(--log-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 10px;
      height: 380px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85em;
    }

    .logs-container ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    .logs-container li {
      margin-bottom: 5px;
      word-break: break-all;
    }

    .log-time {
      color: #888;
      margin-right: 10px;
    }

    .log-action {
      color: #d08700;
    }

    .log-state {
      color: #28a745;
    }

    .log-error {
      color: #dc3545;
    }

    .log-ivr {
      color: #6f42c1;
    }

    .log-plan {
      color: #007bff;
    }

    [data-theme="dark"] .log-action {
      color: #ffbc3a;
    }

    [data-theme="dark"] .log-state {
      color: #51da71;
    }

    [data-theme="dark"] .log-error {
      color: #ff6b7b;
    }

    [data-theme="dark"] .log-ivr {
      color: #b388ff;
    }

    [data-theme="dark"] .log-plan {
      color: #66b0ff;
    }
  </style>
  <script>
    const storedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', storedTheme);

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const nextTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', nextTheme);
      localStorage.setItem('theme', nextTheme);
    }
  </script>
</head>

<body>

  <div class="container">
    <header>
      <div>
        <h1>IVR Call Assistant</h1>
        <p class="subtitle">Telephony controller</p>
      </div>
      <div class="header-info">
        <button class="theme-toggle" onclick="toggleTheme()">Toggle Dark Mode</button>
        <br>
        <div class="status-indicator">
          <span class="dot" id="liveDot"></span>
          <span id="liveState">Idle</span>
        </div>
      </div>
    </header>

    <div class="main-content">
      <section class="left-panel">
        <h2>Call Configuration</h2>
        <div class="form-group">
          <label for="target">Target Number</label>
          <input type="text" id="target" placeholder="+1 (415) 555-1234" />
        </div>
        <div class="form-group">
          <label for="userPhone">Your Phone (Patch-in)</label>
          <input type="text" id="userPhone" placeholder="+1 (415) 555-9876" />
        </div>
        <div class="form-group">
          <label for="goal">Goal State</label>
          <input type="text" id="goal" placeholder="e.g. Speak with a human representative" />
        </div>
        <div class="form-group">
          <label for="reason">Call Reason Context</label>
          <textarea id="reason" placeholder="Explain the reason for the call..."></textarea>
        </div>

        <div class="button-group">
          <button id="startBtn">Initiate Call</button>
          <button id="stopBtn">End Call</button>
        </div>

        <div class="warning">
          <strong>Notice:</strong> Please ensure you are authorized to contact this number.
        </div>
      </section>

      <section class="right-panel">
        <h2>Analytics & Logs</h2>

        <div class="metrics">
          <div class="metric-item">
            <div class="metric-label">Status</div>
            <div class="metric-value" id="metricState">IDLE</div>
            <div class="metric-note" id="metricPhase">Awaiting config</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">Reached</div>
            <div class="metric-value" id="metricSystems">0</div>
            <div class="metric-note">-</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">Time Saved</div>
            <div class="metric-value" id="metricSaved">0.00m</div>
            <div class="metric-note" id="metricTarget">Target pending</div>
          </div>
        </div>

        <div class="logs-container">
          <ul id="logList"></ul>
        </div>
      </section>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
